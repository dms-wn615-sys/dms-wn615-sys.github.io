<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#a8d8f0">
  <title>오리 블록 게임</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-scene" aria-hidden="true">
    <div class="bg-sky"></div>
    <div class="bg-hills"></div>
    <div class="bg-pond">
      <div class="bg-ripple bg-ripple--1"></div>
      <div class="bg-ripple bg-ripple--2"></div>
      <div class="bg-ripple bg-ripple--3"></div>
    </div>
    <div class="bg-reeds bg-reeds--left"></div>
    <div class="bg-reeds bg-reeds--right"></div>
    <div class="bg-cloud bg-cloud--1"></div>
    <div class="bg-cloud bg-cloud--2"></div>
    <div class="bg-duck bg-duck--1">
      <span class="duck-body"></span>
      <span class="duck-head"></span>
      <span class="duck-beak"></span>
      <span class="duck-eye"></span>
    </div>
    <div class="bg-duck bg-duck--2">
      <span class="duck-body"></span>
      <span class="duck-head"></span>
      <span class="duck-beak"></span>
      <span class="duck-eye"></span>
    </div>
    <div class="bg-duck bg-duck--3">
      <span class="duck-body"></span>
      <span class="duck-head"></span>
      <span class="duck-beak"></span>
      <span class="duck-eye"></span>
    </div>
    <div class="bg-duck bg-duck--4 duck-flipped">
      <span class="duck-body"></span>
      <span class="duck-head"></span>
      <span class="duck-beak"></span>
      <span class="duck-eye"></span>
    </div>
  </div>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="lang-switcher">
          <label for="langSelect" data-i18n="language">언어</label>
          <select id="langSelect" aria-label="Language">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="es">🇪🇸 Español</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
          </select>
        </div>
        <div class="sound-controls">
          <button type="button" class="sound-btn" id="musicToggle" aria-pressed="true" title="BGM">🎵</button>
          <button type="button" class="sound-btn" id="sfxToggle" aria-pressed="true" title="SFX">🔊</button>
        </div>
      </div>
      <h1 data-i18n="title">오리 블록 게임</h1>
      <p class="subtitle" data-i18n="subtitle">블록을 놓아 가로·세로 줄을 채우세요!</p>
      <div class="mode-tabs" role="tablist" aria-label="Game mode">
        <button type="button" class="mode-tab active" id="modeCampaign" data-mode="campaign" data-i18n="modeCampaign">캠페인</button>
        <button type="button" class="mode-tab" id="modeTournament" data-mode="tournament" data-i18n="modeTournament">토너먼트</button>
      </div>
    </header>

    <main class="game-layout">
      <div class="stats-row">
        <div class="stat-box stat-box--level">
          <span class="stat-head">
            <svg class="stat-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="17" width="18" height="2.5" rx="1.2" fill="currentColor" opacity="0.35"/><rect x="5" y="12.5" width="14" height="2.5" rx="1.2" fill="currentColor" opacity="0.6"/><rect x="7" y="8" width="10" height="2.5" rx="1.2" fill="currentColor" opacity="0.85"/><rect x="9" y="3.5" width="6" height="2.5" rx="1.2" fill="currentColor"/></svg>
            <span class="stat-label" data-i18n="level">레벨</span>
          </span>
          <span class="stat-value" id="levelNum">1</span>
        </div>
        <div class="stat-box stat-box--score">
          <span class="stat-head">
            <svg class="stat-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2.5l2.55 7.85h8.25l-6.68 4.85 2.55 7.85L12 17.2l-6.67 4.85 2.55-7.85L1.2 10.35h8.25L12 2.5z"/></svg>
            <span class="stat-label" data-i18n="score">점수</span>
          </span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat-box stat-box--clears">
          <span class="stat-head">
            <svg class="stat-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="2.5" rx="1.2" fill="currentColor" opacity="0.35"/><rect x="3" y="10.75" width="18" height="2.5" rx="1.2" fill="currentColor"/><rect x="3" y="16.5" width="18" height="2.5" rx="1.2" fill="currentColor" opacity="0.35"/></svg>
            <span class="stat-label" data-i18n="clears">제거</span>
          </span>
          <span class="stat-value" id="clears">0</span>
        </div>
        <div class="stat-box stat-box--combo" id="comboBox">
          <span class="stat-head">
            <svg class="stat-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2c.8 3.2 3.2 4.2 3.2 7.6a3.2 3.2 0 11-6.4 0C8.8 6.2 11.2 5.2 12 2z"/><path fill="currentColor" d="M8 14c0-2.2 1.8-4 4-4s4 1.8 4 4c0 2.2-1.8 4-4 4s-4-1.8-4-4z" opacity="0.85"/></svg>
            <span class="stat-label" data-i18n="combo">콤보</span>
          </span>
          <span class="stat-value" id="combo">0</span>
        </div>
      </div>
      <div class="level-goal" id="levelGoal" aria-live="polite"></div>

      <div class="board-wrapper">
        <canvas id="gameCanvas" width="320" height="320"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-content">
            <h2 id="overlayTitle">오리 블록 게임</h2>
            <p id="overlayMessage">시작하려면 버튼을 누르세요</p>
            <button class="btn-primary" id="startBtn">게임 시작</button>
          </div>
        </div>
      </div>

      <div class="piece-tray">
        <span class="stat-label tray-label" data-i18n="pickBlock">블록 선택</span>
        <div class="tray-slots" id="traySlots">
          <div class="tray-slot" data-index="0"><canvas width="100" height="100"></canvas></div>
          <div class="tray-slot" data-index="1"><canvas width="100" height="100"></canvas></div>
          <div class="tray-slot" data-index="2"><canvas width="100" height="100"></canvas></div>
        </div>
      </div>

      <div class="controls-box">
        <span class="stat-label" data-i18n="controls">조작법</span>
        <p class="controls-hint" data-i18n="controlsHint">블록을 선택한 뒤 보드에 놓을 위치를 클릭하세요.</p>
      </div>

      <button class="btn-secondary" id="pauseBtn" disabled data-i18n="pause">일시정지</button>

      <p class="legal-footer">
        <a href="licenses.html">저작권·오픈소스 고지</a>
        ·
        <a href="privacy-policy.html">개인정보 처리방침</a>
      </p>

      <section class="leaderboard tournament-board" id="tournamentBoard" aria-labelledby="tournamentTitle" hidden>
        <div class="leaderboard-header">
          <span class="stat-label" id="tournamentTitle" data-i18n="tournamentRankings">일일 토너먼트</span>
          <span class="tournament-day" id="tournamentDay"></span>
        </div>
        <ol class="leaderboard-list" id="tournamentList"></ol>
      </section>

      <section class="leaderboard" id="leaderboard" aria-labelledby="leaderboardTitle">
        <div class="leaderboard-header">
          <span class="stat-label" id="leaderboardTitle" data-i18n="rankings">점수 순위</span>
          <input type="text" id="playerName" class="player-name-input" maxlength="12" autocomplete="nickname" aria-label="Player name">
        </div>
        <ol class="leaderboard-list" id="leaderboardList"></ol>
      </section>
    </main>
  </div>

  <script src="audio.js"></script>
  <script src="levels.js"></script>
  <script src="tournament.js"></script>
  <script src="game.js"></script>
</body>
</html>
